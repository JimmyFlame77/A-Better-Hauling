<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | relative_url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ '/images/logo.png' | relative_url }}">
  <meta property="og:url" content="{{ page.url | relative_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/images/logo.png' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/images/logo.png' | relative_url }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">

  <!-- LocalBusiness Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "{{ site.data.site.company_name }}",
    "description": "{{ site.description }}",
    "telephone": "{{ site.data.site.phone }}",
    "email": "{{ site.data.site.email }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Elizabeth",
      "addressRegion": "{{ site.data.site.state }}",
      "addressCountry": "US"
    },
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "image": "{{ '/images/logo.png' | relative_url }}",
    "openingHours": "Mo-Fr 07:00-17:00",
    "sameAs": [
      "{{ site.data.site.facebook }}"
    ]
  }
  </script>
</head>
