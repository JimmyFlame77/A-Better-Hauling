<header class="site-header">
    <div class="container header-inner">
        <div class="site-branding">
            <a href="{{ '/' | relative_url }}">
                <img src="{{ '/images/logo.png' | relative_url }}" alt="{{ site.data.site.company_name }}" class="custom-logo">
            </a>
        </div>
        <nav class="main-navigation">
            <ul class="nav-list">
                {% for link in site.data.navigation %}
                <li><a href="{{ link.url | relative_url }}">{{ link.label }}</a></li>
                {% endfor %}
                <li class="mobile-only-book"><a href="{{ site.data.site.phone_link }}" class="btn-metal btn-flyout">Call Now</a></li>
            </ul>
        </nav>
        <a href="{{ site.data.site.phone_link }}" class="btn-metal btn-header btn-header-desktop">Call Now</a>
        <button class="mobile-menu-toggle" aria-label="Open Menu" aria-expanded="false">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </div>
</header>
