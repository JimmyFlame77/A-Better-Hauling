- title: "Residential Roll-Off Dumpsters"
  icon: "🏠"
  description: "Perfect for home renovations, garage cleanouts, and major landscaping projects. Drop it at your property, fill it at your own pace, and we'll haul it away."
  cta: "Call Now"
  link: "tel:3035229020"
  faqs:
    - question: "What size dumpster do I need for my project?"
      answer: "For small projects like a single bathroom remodel or closet cleanout, a 15-yard dumpster is usually enough. For mid-sized projects like a room renovation, basement cleanout, or larger landscaping job, an 18-, 20-, or 25-yard dumpster is typically appropriate. For whole-home cleanouts or multi-room renovations, a 30- or 40-yard dumpster helps you avoid multiple hauls."
    - question: "What can and can't I put in a residential roll-off dumpster?"
      answer: "You can place household junk, furniture, non-refrigerant appliances, construction debris (wood, drywall, flooring, roofing), and typical yard waste. You must not place hazardous materials such as chemicals, oils, paint, asbestos, batteries, tires, electronics with screens, medical waste, or anything explosive or highly flammable. If you're unsure about an item, contact us before loading it so we can confirm if it's allowed."
    - question: "How much space and access do you need to place the dumpster in my driveway?"
      answer: "We need a relatively level area with enough room for the dumpster and for our truck to back in and lower it safely. Plan for about the length of two standard parking spaces and clear vehicles, branches, and other obstacles from the area. If your driveway is steep, narrow, or has tight turns, let us know in advance so we can confirm safe placement."
    - question: "How should I load the dumpster to avoid issues during pickup?"
      answer: "Place heavier items on the bottom and keep the weight spread out evenly across the container. Break down bulky items so they fit below the top rail and use the space efficiently. Do not load above the top of the dumpster; debris must be level so we can tarp and haul it safely."
    - question: "What happens if I need more time than the included 14-day rental period?"
      answer: "If you expect to need more than 14 days, contact us before your rental ends to request an extension. Keeping the dumpster longer without prior approval may result in additional time charges based on our rental policies. If you finish early, let us know and we'll schedule pickup as soon as we can."

- title: "Commercial Roll-Off Dumpsters"
  icon: "🏗️"
  description: "Heavy-duty containers built for construction sites, roofing tear-offs, and major demolitions. Reliable swap-outs to keep your job site moving."
  cta: "Call Now"
  link: "tel:3035229020"
  faqs:
    - question: "What size roll-off container do I actually need for a large construction or demolition job?"
      answer: "For most commercial projects, a 30-yard or 40-yard container is appropriate. A 30-yard works well for roofing tear-offs and mid-sized renovations, while a 40-yard is better for full demolitions or large-scale construction debris. If your material is especially heavy (like concrete or dirt), a smaller container may be required to stay within weight limits."
    - question: "How quickly can you swap a full container on an active job site?"
      answer: "We coordinate same-day or next-day swap-outs depending on your schedule and site conditions. If you call early, we can often replace a full container before your crew pauses work, minimizing downtime and keeping debris moving off-site continuously."
    - question: "What materials are not allowed in commercial roll-off containers?"
      answer: "Hazardous materials are not permitted, including chemicals, paints, solvents, asbestos, batteries, and certain electronics. If you're unsure about a specific material, check with us before loading to avoid rejected pickups or additional handling requirements."
    - question: "How should a job site be prepared for roll-off delivery and pickup?"
      answer: "Ensure there is clear, level access for a large truck with overhead clearance (no low wires or branches). The drop area should be free of vehicles and debris. Soft or unstable ground can cause delays or unsafe placement, so a solid surface like gravel or pavement is preferred."
    - question: "What causes delays or missed pickups on commercial jobs?"
      answer: "The most common issues are blocked access, overloaded containers (material above the rim), and restricted site entry times. Keeping the container accessible, level-loaded, and within weight limits allows us to service your site on schedule without interruption."

- title: "Grapple Truck Service"
  icon: "🦾"
  description: "Our grapple truck eliminates labor involved with property cleanups, debris removal, and demolition projects. We grab it, load it, and haul it — no lifting required."
  cta: "Call Now"
  link: "tel:3035229020"
  faqs:
    - question: "What types of jobs actually require a grapple truck instead of a dumpster?"
      answer: "A grapple truck is used when debris is too large, heavy, or bulky to safely load by hand. This includes full structure tear-downs (sheds, decks, small buildings), storm debris with large limbs, and dense brush piles that would take hours to cut down and load into a container. If material cannot be reasonably lifted or broken down on-site, a grapple truck is the correct solution."
    - question: "Do I need to move or stage debris before your crew arrives?"
      answer: "No. Materials can remain where they fall or where they were demolished. The grapple arm is designed to reach, grab, and remove debris directly from the ground, including over fences or from tight areas where equipment access is limited. Pre-staging is not required and often unnecessary."
    - question: "What are the limitations of a grapple truck?"
      answer: "Grapple trucks are not suited for loose, small, or scattered debris such as gravel, dirt, or fine construction waste. They also require overhead clearance for the arm to operate safely and enough access space for the truck to position near the debris. Extremely confined indoor removals are not compatible with this service."
    - question: "How does a grapple truck handle demolition debris differently than manual loading?"
      answer: "Instead of cutting materials into smaller pieces and loading them by hand, the grapple grabs and lifts large sections directly. This reduces handling time, eliminates repeated lifting, and allows removal of entire structural components like deck frames or shed walls in fewer passes."
    - question: "Can a grapple truck remove debris without damaging surrounding property?"
      answer: "Yes, when access and clearance are appropriate. The operator controls the grapple with precision to target debris without dragging material across lawns or structures. However, the truck must be positioned on stable ground, and some surface impact may occur depending on weight, soil conditions, and proximity to the work area."

